# Portal Scanner Configuration — Ranjan Mohanty
# Senior Program Manager | Capital Projects | Telecom | AI-Augmented PM
# Target: Senior PM, Director PMO, Head of PMO, TPM, AI PM
# Location: Aurora IL (Chicagoland) — hybrid/remote, open to energy sector

title_filter:
  positive:
    - "Program Manager"
    - "Project Manager"
    - "Senior Program Manager"
    - "Director of Program Management"
    - "Director, Program"
    - "VP Program"
    - "Head of PMO"
    - "PMO Director"
    - "PMO Manager"
    - "PMO Lead"
    - "Portfolio Manager"
    - "Portfolio Director"
    - "Delivery Manager"
    - "Technical Program Manager"
    - "TPM"
    - "AI Program Manager"
    - "Digital Transformation"
    - "Transformation Lead"
    - "Transformation Manager"
    - "Change Management"
    - "Capital Projects"
    - "Capital Program"
    - "Construction Program"
    - "Infrastructure Program"
    - "IT Program Manager"
    - "IT Project Manager"
    - "Engagement Manager"
    - "Senior Consultant"
    - "Delivery Lead"
    - "Program Director"
    - "Project Director"
  negative:
    - "Junior"
    - "Intern"
    - "Entry Level"
    - "Associate Project"
    - "Coordinator"
    - "Scheduler"
    - "Estimator"
    - "Accountant"
    - "Sales"
    - "Marketing"
    - "HR "
    - "Recruiter"
  seniority_boost:
    - "Senior"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "VP"
    - "Staff"

# -- Search queries --
# Broad discovery via WebSearch + site: filters

search_queries:

  # -- LinkedIn (broad PM discovery) --
  - name: LinkedIn — Senior PM Chicago/Remote
    query: 'site:linkedin.com/jobs "Senior Program Manager" OR "Director of Program Management" Chicago OR remote Illinois posted:past-2-days'
    enabled: true

  - name: LinkedIn — Capital Projects PM
    query: 'site:linkedin.com/jobs "Capital Projects" "Program Manager" OR "Project Director" remote OR Chicago'
    enabled: true

  - name: LinkedIn — Energy Sector PM
    query: 'site:linkedin.com/jobs "Program Manager" energy OR utilities OR "power generation" OR "renewable energy" Illinois OR remote'
    enabled: true

  - name: LinkedIn — TPM / AI PM
    query: 'site:linkedin.com/jobs "Technical Program Manager" OR "AI Program Manager" senior remote OR Chicago'
    enabled: true

  # -- Indeed --
  - name: Indeed — Senior PM Chicago
    query: 'site:indeed.com "Senior Program Manager" OR "Director Program Management" Chicago OR Aurora IL OR remote'
    enabled: true

  - name: Indeed — PMO Director / Head of PMO
    query: 'site:indeed.com "Head of PMO" OR "PMO Director" OR "PMO Manager" Illinois OR remote'
    enabled: true

  - name: Indeed — Energy PM
    query: 'site:indeed.com "Program Manager" energy OR utilities OR construction Illinois OR remote senior'
    enabled: true

  # -- Greenhouse (tech companies with PM teams) --
  - name: Greenhouse — Senior PM / TPM
    query: 'site:job-boards.greenhouse.io "Senior Program Manager" OR "Technical Program Manager" OR "Director of Program Management"'
    enabled: true

  - name: Greenhouse — TPM remote
    query: 'site:boards.greenhouse.io "Technical Program Manager" OR "Senior Program Manager" remote'
    enabled: true

  # -- Lever --
  - name: Lever — Senior PM / Director PMO
    query: 'site:jobs.lever.co "Senior Program Manager" OR "Director of Program Management" OR "Head of PMO" remote'
    enabled: true

  # -- Ashby --
  - name: Ashby — Senior PM / TPM
    query: 'site:jobs.ashbyhq.com "Program Manager" OR "Technical Program Manager" OR "Delivery Manager" senior remote'
    enabled: true

  # -- Wellfound (startups) --
  - name: Wellfound — Senior PM / TPM
    query: 'site:wellfound.com "Senior Program Manager" OR "Technical Program Manager" OR "Head of PMO" remote'
    enabled: true

  # -- Workable --
  - name: Workable — Senior PM
    query: 'site:apply.workable.com "Senior Program Manager" OR "Program Director" OR "PMO" remote OR Chicago'
    enabled: true

  # -- Consulting firms (Glassdoor/company sites) --
  - name: Consulting firms — PM / Engagement Manager
    query: '"Engagement Manager" OR "Senior Consultant" "program management" OR "capital projects" Accenture OR Deloitte OR BCG OR McKinsey remote'
    enabled: true

  # -- Energy sector --
  - name: Energy companies — PM roles
    query: '"Program Manager" OR "Project Director" "energy" OR "utilities" OR "renewable" OR "grid" OR "power plant" Illinois OR Midwest OR remote senior'
    enabled: true

  # -- Telecom --
  - name: Telecom — Senior PM / TPM
    query: '"Program Manager" OR "Technical Program Manager" telecom OR "network deployment" OR "5G" OR "fiber" senior remote OR Chicago'
    enabled: true

  # -- Construction / EPC --
  - name: EPC / Construction — Program Manager
    query: '"Program Manager" OR "Project Director" construction OR "EPC" OR "capital projects" OR "infrastructure" senior Illinois OR remote'
    enabled: true

  # -- Medical devices / Healthcare --
  - name: Medical devices — Senior PM
    query: 'site:linkedin.com/jobs OR site:indeed.com "Program Manager" "medical device" OR "medtech" OR "healthcare" Illinois OR remote senior'
    enabled: true

  # -- Manufacturing --
  - name: Manufacturing — Senior PM
    query: '"Program Manager" OR "Project Director" manufacturing OR "supply chain" OR "operations" Illinois OR Midwest senior remote'
    enabled: true

  # -- Himalayas / Remote-first aggregators --
  - name: Himalayas — Remote Senior PM
    query: 'site:himalayas.app "Senior Program Manager" OR "Technical Program Manager" OR "Director of Program Management" remote'
    enabled: true

  - name: WeWorkRemotely — PM
    query: 'site:weworkremotely.com "Program Manager" OR "Technical Program Manager" OR "Delivery Manager" senior'
    enabled: true

